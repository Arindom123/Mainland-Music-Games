<!DOCTYPE html>
<html>
<head>
    <!--call CSS, tab title-->
    <link href="style.css" rel="stylesheet">
    <title>Mainland Music Games</title>
</head>
<body>
    <header> <!--constant home button-->
        <img id="home-logo" src="assets/marimba.png" alt="Mainland Music Logo">
    </header>
    <div class="homepage"> <!--home page HTML div-->
    <main>
        <div class="homepage-titles">
            <h1>Mainland Music Games</h1>
            <h2>Percussion Family</h2>
        </div>
        <div class="instrument-selection">
            <button type="button">Marimba</button>
            <button type="button">Xylophone</button>
            <button type="button">Vibraphone</button>
            <button type="button">Bells</button>
        </div>
    </main>
    <footer>
        <p>By: Arindom Paul<br>Mainland Tri-M</p>
        <button type="button">
            <img id="github" src="assets/github-cat.png" alt="Arindom's GitHub">
        </button>
    </footer>
    </div> <!--end home screen div-->
    <div class="free-play"> <!--free play screen div-->
        <h1>Scale Selection</h1>
        <label for="Roots">Roots</label>
            <select name="Roots" id="Roots">
            <option value="A">A</option>
            <option value="A#">A#/B♭</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="C#">C#/D♭</option>
            <option value="D">D</option>
            <option value="D#">D#/E♭</option>
            <option value="E">E</option>
            <option value="F">F</option>
            <option value="F#">F#/G♭</option>
            <option value="G">G</option>
            <option value="G#">G#/A♭</option>
            </select>
        <div id= "scaleType" class="scale-type">
            <button type="button">Major</button>
            <button type="button">Minor</button>
            <button type="button">Pentatonic</button>
            <button type="button">Blues</button>
            <button type="button">Chromatic</button>
        </div>
        <div class="minor-variations">
            <h1>Minor Variations</h1>
            <button type="button" class="minor-button" disabled>Natural</button>
            <button type="button" class="minor-button" disabled>Harmonic</button>
            <button type="button" class="minor-button" disabled>Melodic</button>
        </div>
        <div class="metronome">
            <label for="bpm">Tempo:</label>
            <input type="number" id="bpm" name="bpm" min="1" max="999">
            <span>bpm</span>
        </div>
        <div id="instrument-board"></div> <!--empty div for js-->
    </div> <!--end free play screen div-->
    <script src="script.js"></script> <!--call javascript-->
</body>
</html>
