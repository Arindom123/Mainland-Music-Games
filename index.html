<!DOCTYPE html>
<html>
<head>
    <!--call CSS, tab title-->
    <link href="style.css" rel="stylesheet">
    <title>Mainland Music Games</title>
</head>
<body>
    <header> <!--constant home button-->
        <img id="home-logo" src="assets/marimba.png" alt="Mainland Music Logo">
    </header>
    <div class="homepage"> <!--home page HTML div-->
    <main>
        <div class="homepage-titles">
            <h1>Mainland Music Games</h1>
            <h2>Percussion Family</h2>
        </div>
        <div class="instrument-selection">
            <button class = "instrument" id = "marimba" type="button">Marimba</button>
            <button class = "instrument" id = "xylophone" type="button">Xylophone</button>
            <button class = "instrument" id = "vibraphone" type="button">Vibraphone</button>
            <button class = "instrument" id = "bells" type="button">Bells</button>
        </div>
    </main>
    <footer>
        <p>By: Arindom Paul<br>Mainland Tri-M</p>
        <a
            href = "https://github.com/Arindom123" target = "_blank">
            <img id = "github" src="assets/github-cat-black.png" alt="Check out my work!">
        </a>
    </footer>
    </div> <!--end home screen div-->
    <div class="free-play"> <!--free play screen div-->
        <h1>Scales</h1>
        <label for="Roots">Root:</label> <!--root selection-->
            <select name="Roots" id="Roots">
            <option value="A">A</option>
            <option value="Bb">A#/B♭</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="Db">C#/D♭</option>
            <option value="D">D</option>
            <option value="Eb">D#/E♭</option>
            <option value="E">E</option>
            <option value="F">F</option>
            <option value="Gb">F#/G♭</option>
            <option value="G">G</option>
            <option value="Ab">G#/A♭</option>
            </select>
        <div id= "scaleType" class="scale-type"> <!--scaletype selection-->
            <button class = "scaleType" id = "scaleMajor" type="button" data-pattern = "majorPattern" data-variation = "false" >Major</button>
            <button class = "scaleType" id = "scaleMinor" type="button" data-pattern = "none" data-variation = "naturalMelodicHarmonic" >Minor</button>
            <button class = "scaleType" id = "scalePentatonic" type="button" data-pattern = "none" data-variation = "minorMajor" >Pentatonic</button>
            <button class = "scaleType" id = "scaleBlues" type="button" data-pattern = "none" data-variation = "minorMajor" >Blues</button>
            <button class = "scaleType" id = "scaleChromatic" type="button" data-pattern = "chromaticPattern" data-variation = "false" >Chromatic</button>
        </div>
        <div id = "variations" class="variations"> <!--scale variations-->
            <div id = "header">
            <h1>Variations</h1>
            </div>
            <div class = minorVariations>
            <button class = "minorVariation" id = "naturalVariation" type="button" hidden>Natural</button>
            <button class = "minorVariation" id = "harmonicVariation" type="button" hidden>Harmonic</button>
            <button class = "minorVariation" id = "melodicVariation" type="button" hidden>Melodic</button>
            </div>
            <div class = bluesPentatonicVariations>
            <button class = "bluesPentatonicVariation" id = "majorVariation" type="button" hidden>Major</button>
            <button class = "bluesPentatonicVariation" id = "minorVariation" type ="button" hidden>Minor</button>
            </div>
        </div>
        <div class="metronome">
            <label for="bpm">Tempo:</label>
            <input type="number" id="bpm" name="bpm" min="1" max="999">
            <span>bpm</span>
        </div>
        <div id="instrument-board"></div> <!--empty div for js-->
    </div> <!--end free play screen div-->
    <script src="script.js"></script> <!--call javascript-->
</body>
</html>
